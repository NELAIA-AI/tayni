# TAYNI Build Workflow
# 
# Triggers:
# - Manual: workflow_dispatch (for testing)
# - Automatic: on push to version tags (v*) - creates GitHub Release
#
# To run manually: Go to Actions tab → "Build and Test" → "Run workflow"

name: Build and Test

on:
  # MANUAL TRIGGER
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Build release binaries for GitHub Release'
        required: false
        default: false
        type: boolean

  # AUTOMATIC: Build and release on version tags
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # BUILD - Windows x64
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (Debug)
        run: cargo build --verbose

      - name: Build (Release)
        if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
        run: cargo build --release --verbose

      - name: Run Tests
        run: cargo test --verbose

      - name: Verify Compiler
        run: |
          ./target/debug/tayni-c.exe --version
          ./target/debug/tayni-c.exe --help

      - name: Test Compilation (if examples exist)
        run: |
          if (Test-Path "examples/hello.tayni") {
            ./target/debug/tayni-c.exe examples/hello.tayni -o hello_test
            Write-Host "Compilation successful (default PE emission)"
          } else {
            Write-Host "No examples/hello.tayni found, skipping"
          }
        shell: pwsh

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v5
        with:
          name: tayni-c-windows-x64-debug
          path: target/debug/tayni-c.exe
          retention-days: 7

      - name: Upload Release Artifact
        if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v5
        with:
          name: tayni-c-windows-x64-release
          path: target/release/tayni-c.exe
          retention-days: 30

  # ============================================
  # BUILD - Linux x64
  # ============================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (Debug)
        run: cargo build --verbose

      - name: Build (Release)
        if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
        run: cargo build --release --verbose

      - name: Run Tests
        run: cargo test --verbose

      - name: Verify Compiler
        run: |
          ./target/debug/tayni-c --version
          ./target/debug/tayni-c --help

      - name: Test Compilation (if examples exist)
        run: |
          if [ -f "examples/hello.tayni" ]; then
            ./target/debug/tayni-c examples/hello.tayni -o hello_test
            echo "Compilation successful (default ELF emission)"
          else
            echo "No examples/hello.tayni found, skipping"
          fi

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v5
        with:
          name: tayni-c-linux-x64-debug
          path: target/debug/tayni-c
          retention-days: 7

      - name: Upload Release Artifact
        if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v5
        with:
          name: tayni-c-linux-x64-release
          path: target/release/tayni-c
          retention-days: 30

  # ============================================
  # BUILD - macOS (Intel x64 + Apple Silicon ARM64)
  # ============================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (Debug - native)
        run: cargo build --verbose

      - name: Build (Release - ARM64)
        if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
        run: cargo build --release --target aarch64-apple-darwin --verbose

      - name: Build (Release - x64)
        if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
        run: cargo build --release --target x86_64-apple-darwin --verbose

      - name: Run Tests
        run: cargo test --verbose

      - name: Verify Compiler
        run: |
          ./target/debug/tayni-c --version
          ./target/debug/tayni-c --help

      - name: Test Compilation (if examples exist)
        run: |
          if [ -f "examples/hello.tayni" ]; then
            ./target/debug/tayni-c examples/hello.tayni -o hello_test
            echo "Compilation successful (default Mach-O emission)"
          else
            echo "No examples/hello.tayni found, skipping"
          fi

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v5
        with:
          name: tayni-c-macos-debug
          path: target/debug/tayni-c
          retention-days: 7

      - name: Upload Release Artifact (ARM64)
        if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v5
        with:
          name: tayni-c-macos-arm64-release
          path: target/aarch64-apple-darwin/release/tayni-c
          retention-days: 30

      - name: Upload Release Artifact (x64)
        if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v5
        with:
          name: tayni-c-macos-x64-release
          path: target/x86_64-apple-darwin/release/tayni-c
          retention-days: 30

  # ============================================
  # VALIDATION - Documentation Examples
  # ============================================
  validate-examples:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Compiler
        uses: actions/download-artifact@v5
        with:
          name: tayni-c-linux-x64-debug
          path: ./bin

      - name: Make Executable
        run: chmod +x ./bin/tayni-c

      - name: Validate JSONL Examples (syntax only)
        run: |
          echo "Validating training data examples..."
          if [ -f "docs/TAYNI-TRAINING-DATA.jsonl" ]; then
            count=0
            errors=0
            while IFS= read -r line; do
              count=$((count + 1))
              code=$(echo "$line" | jq -r '.output // empty')
              if [ -n "$code" ]; then
                echo "$code" > /tmp/test_$count.tayni
                if ! ./bin/tayni-c /tmp/test_$count.tayni --check 2>/dev/null; then
                  echo "Warning: Example $count may have issues"
                  errors=$((errors + 1))
                fi
              fi
            done < docs/TAYNI-TRAINING-DATA.jsonl
            echo "Validated $count examples, $errors warnings"
          else
            echo "No training data found"
          fi

  # ============================================
  # RELEASE - Create GitHub Release (manual only)
  # ============================================
  release:
    if: ${{ inputs.build_release || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Windows Release
        uses: actions/download-artifact@v5
        with:
          name: tayni-c-windows-x64-release
          path: ./release/windows

      - name: Download Linux Release
        uses: actions/download-artifact@v5
        with:
          name: tayni-c-linux-x64-release
          path: ./release/linux

      - name: Download macOS ARM64 Release
        uses: actions/download-artifact@v5
        with:
          name: tayni-c-macos-arm64-release
          path: ./release/macos-arm64

      - name: Download macOS x64 Release
        uses: actions/download-artifact@v5
        with:
          name: tayni-c-macos-x64-release
          path: ./release/macos-x64

      - name: Prepare Release Assets
        run: |
          cd release
          # Windows
          mv windows/tayni-c.exe tayni-c-windows-x64.exe
          sha256sum tayni-c-windows-x64.exe > tayni-c-windows-x64.exe.sha256
          # Linux
          mv linux/tayni-c tayni-c-linux-x64
          chmod +x tayni-c-linux-x64
          sha256sum tayni-c-linux-x64 > tayni-c-linux-x64.sha256
          # macOS ARM64 (Apple Silicon)
          mv macos-arm64/tayni-c tayni-c-macos-arm64
          chmod +x tayni-c-macos-arm64
          sha256sum tayni-c-macos-arm64 > tayni-c-macos-arm64.sha256
          # macOS x64 (Intel)
          mv macos-x64/tayni-c tayni-c-macos-x64
          chmod +x tayni-c-macos-x64
          sha256sum tayni-c-macos-x64 > tayni-c-macos-x64.sha256

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: TAYNI v${{ steps.version.outputs.version }}
          draft: true
          files: |
            release/tayni-c-windows-x64.exe
            release/tayni-c-windows-x64.exe.sha256
            release/tayni-c-linux-x64
            release/tayni-c-linux-x64.sha256
            release/tayni-c-macos-arm64
            release/tayni-c-macos-arm64.sha256
            release/tayni-c-macos-x64
            release/tayni-c-macos-x64.sha256
          body: |
            ## TAYNI Compiler v${{ steps.version.outputs.version }}
            
            **Typed AI Native Instructions** - Graph-based language for AI code generation.
            
            ### Downloads
            | Platform | Binary | Checksum |
            |----------|--------|----------|
            | Windows x64 | `tayni-c-windows-x64.exe` | `.sha256` |
            | Linux x64 | `tayni-c-linux-x64` | `.sha256` |
            | macOS ARM64 (Apple Silicon) | `tayni-c-macos-arm64` | `.sha256` |
            | macOS x64 (Intel) | `tayni-c-macos-x64` | `.sha256` |
            
            ### Verification
            ```bash
            # Verify SHA256 (Linux/macOS)
            sha256sum -c tayni-c-linux-x64.sha256
            ```
            
            ### Quick Start
            ```bash
            # Download and run (example for macOS ARM64)
            chmod +x tayni-c-macos-arm64
            ./tayni-c-macos-arm64 --version
            
            # Compile a program (no flags needed!)
            ./tayni-c-macos-arm64 hello.tayni -o hello
            ./hello
            ```
            
            ### Zero Dependencies
            The compiler produces native executables directly.
            No Clang, GCC, or other tools required.
            
            ### Tiny Binaries
            - Linux: 145 bytes (Hello World)
            - Windows: 1KB
            - macOS: 4KB
